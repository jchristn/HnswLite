server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss;

    # Long-cache hashed static assets.
    location ~* ^/dashboard/assets/.*\.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback for the dashboard.
    location /dashboard/ {
        try_files $uri $uri/ /dashboard/index.html;
    }

    # Proxy API calls to the HnswLite server. The target hostname is the
    # service name in the docker-compose network; override with HNSWLITE_SERVER_URL
    # at build time if hosting differently.
    location /v1.0/ {
        proxy_pass http://hnswlite-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root of the container redirects to the dashboard.
    location = / {
        return 302 /dashboard/;
    }

    # Browsers auto-request /favicon.ico at origin root regardless of <link rel="icon">.
    # Serve the dashboard favicon there so tabs, bookmarks, and OS dock icons all pick it up.
    location = /favicon.ico {
        alias /usr/share/nginx/html/dashboard/favicon.ico;
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
